name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - {goos: linux,   goarch: amd64, runner: ubuntu-latest, ext: "",    archive: tar}
          - {goos: linux,   goarch: arm64, runner: ubuntu-latest, ext: "",    archive: tar}
          - {goos: windows, goarch: amd64, runner: ubuntu-latest, ext: .exe,  archive: zip}
          - {goos: windows, goarch: arm64, runner: ubuntu-latest, ext: .exe,  archive: zip}
          - {goos: darwin,  goarch: amd64, runner: macos-latest,  ext: "",    archive: tar}
          - {goos: darwin,  goarch: arm64, runner: macos-latest,  ext: "",    archive: tar}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          go build -ldflags "-s -w -X main.Version=${VERSION}" -o "gco${{ matrix.ext }}" ./cmd/gco

      - name: Create archive
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            ASSET="gco-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.zip"
            zip "${ASSET}" "gco${{ matrix.ext }}"
          else
            ASSET="gco-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
            tar czf "${ASSET}" "gco${{ matrix.ext }}"
          fi
          echo "ASSET=${ASSET}" >> "${GITHUB_ENV}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
